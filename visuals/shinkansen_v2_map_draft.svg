    <text class="legend-small" x="24" y="66">Use a clean multi-line rail map before Tokyo complexity.</text>
    <text class="legend-small" x="24" y="98">Focus on long-distance interception and branching routes.</text>
    <text class="legend" x="24" y="144">Line Set</text>
    <line class="rail" x1="28" y1="174" x2="82" y2="174" stroke="#2b78c5"/>
