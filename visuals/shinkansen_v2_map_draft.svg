<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">OniChase V2 Shinkansen Map Draft</title>
  <desc id="desc">Schematic draft map for OniChase version 2 using the nationwide Shinkansen network as a multi-line strategy map.</desc>
  <defs>
    <style>
      .bg { fill: #f7f3ea; }
      .panel { fill: #fffdf8; stroke: #d9d1c0; stroke-width: 2; }
      .title { font: 700 34px Helvetica, Arial, sans-serif; fill: #1f2933; }
      .subtitle { font: 500 18px Helvetica, Arial, sans-serif; fill: #5f6b76; }
      .legend { font: 700 15px Helvetica, Arial, sans-serif; fill: #1f2933; }
      .legend-small { font: 500 14px Helvetica, Arial, sans-serif; fill: #46515c; }
      .line-label { font: 700 16px Helvetica, Arial, sans-serif; fill: #1f2933; }
      .station-label { font: 700 16px Helvetica, Arial, sans-serif; fill: #1f2933; }
      .station-ja { font: 500 12px Helvetica, Arial, sans-serif; fill: #61707d; }
      .hub { fill: #ffffff; stroke: #1f2933; stroke-width: 4; }
      .node { fill: #ffffff; stroke: #1f2933; stroke-width: 3; }
      .ghost { fill: none; stroke: #d9d1c0; stroke-width: 24; stroke-linecap: round; stroke-linejoin: round; }
      .rail { fill: none; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; }
      .connector { stroke: #8a97a3; stroke-width: 6; stroke-dasharray: 10 10; fill: none; stroke-linecap: round; }
      .guide { font: 600 14px Helvetica, Arial, sans-serif; fill: #6a7884; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="980"/>

  <rect class="panel" x="40" y="34" width="1520" height="910" rx="28"/>
  <text class="title" x="84" y="96">OniChase V2 Map Draft</text>
  <text class="subtitle" x="84" y="130">Nationwide Shinkansen schematic for the first multi-line strategy version</text>

